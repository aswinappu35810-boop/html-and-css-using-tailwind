<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/5ceafa5cf5.js" crossorigin="anonymous"></script>
    <title>sign in</title>
</head>
<body>
    <div class=" bg-[#000000] flex justify-center items-center w-screen h-screen">

        <div class="bg-[#212121] w-[385px] h-[615px] rounded-[15px] flex flex-col justify-start items-center ">
            <div class="ml-[335px] mt-[19px] text-[12px]"><i class="fa-solid fa-x" style="color: rgb(255, 255, 255);"></i></div>
            <p class="text-[30px] text-white font-600 mt-[12px] ">Log in or sign up</p>
            <p class="text-white text-[16px] mt-[15px]">You’ll get smarter responses and can</p>
            <p class="text-white text-[16px] mt-[0px]">upload files, images, and more.</p>

            <button class="flex justify-center items-center mt-[37px] w-[340px] h-[50px] border-[#434343] border-[1.5px] rounded-[60px] text-white font-[600] hover:bg-[#424242]"><img class="w-[25px] mr-[-1px] mt-[2px]" src="google-logo-removebg-preview.png" alt="">Continue with Google</button>
            <button class="flex justify-center items-center mt-[10px] w-[340px] h-[50px] border-[#434343] border-[1.5px] rounded-[60px] text-white font-[600] hover:bg-[#424242]"><img class="w-[15px] mr-[5px]" src="apple.png" alt="">Continue with Apple</button>
            <button class="flex justify-center items-center mt-[10px] w-[340px] h-[50px] border-[#434343] border-[1.5px] rounded-[60px] text-white font-[600] hover:bg-[#424242]"><i class="fa-solid fa-phone mr-[3px]" style="color: rgb(255, 255, 255); "></i>Continue with Phone</button>
            <div class="flex justify-center items-center mt-[35px] gap-[15px]">
                <div class="w-[145px] mb-[5px] h-[0.51px] bg-[#434343] "></div>
                <p class="text-[#434343] mb-[5px] text-[12px] font-[600]">OR</p>
                <div class="w-[145px] mb-[5px] h-[0.51px] bg-[#434343] "></div>
            </div>
            <form action="#" class="flex flex-col justify-center items-center">
                <input type="email" placeholder="Email address" required class="flex justify-center items-center mt-[20px] bg-black w-[340px] h-[50px] placeholder-[#5a5a5a] p-[20px] border-[#676767] border-[1.5px] rounded-[60px] text-white font-[600]">
                <button type="submit"  class="flex justify-center items-center mt-[20px] bg-white w-[340px] h-[50px] p-[20px] border-[#676767] border-[1.5px] rounded-[60px] text-black font-[600]">Continue</button>
            </form>
        </div>

    </div>


</body>
</html>
