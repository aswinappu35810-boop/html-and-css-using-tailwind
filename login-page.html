<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <div class="w-screen h-screen bg-gray-200 flex justify-center items-center">
        <div class="bg-white w-[420px] p-10 rounded-2xl ">

            <h2 class="text-4xl font-bold text-center text-blue-600">Welcome Back!</h2>
            <p class="mb-10 text-center opacity-50">Please login to account</p>
            <form action="" class="flex flex-col">
                <input type="email" placeholder="Enter your email" class="p-2 mb-5 border-[1.5px] rounded-[10px] border-gray-200">
                <input type="password" placeholder="Password" class="p-2 mb-10 border-[1.5px] rounded-[10px] border-gray-200">
                <button type="submit" class="p-2 bg-[#00A53D] rounded-[10px] hover:bg-gray-400 duration-500 text-white  hover:border-[1.5px] border-gray-200 ">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
